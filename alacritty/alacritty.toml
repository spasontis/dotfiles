[env]
TERM = "xterm-256color"

[window]
padding.x = 20
padding.y = 20

decorations = "ButtonLess"
opacity = 0.92
blur = true

[font]
size = 14.0

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" }
]
